# Sluice — Prefect scheduling mode
#
# Starts a local Prefect server and a sluice worker that registers all enabled
# pipelines as Prefect deployments, then serves them on their cron schedules.
#
# Usage:
#   cp .env.example .env
#   $EDITOR .env
#   docker compose -f docker-compose.prefect.yml up
#
# Prefect UI will be available at http://localhost:4200
#
# To trigger a pipeline manually from the Prefect UI or CLI:
#   prefect deployment run sluice-<pipeline_id>/sluice-<pipeline_id>

services:
  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    env_file:
      - .env
    ports:
      - "4200:4200"
    volumes:
      # Persist Prefect's own SQLite state (flows, runs, deployments)
      - prefect-data:/root/.prefect
    environment:
      TZ: ${TZ:-UTC}
      PREFECT_SERVER_API_AUTH_STRING: ${PREFECT_AUTH_STRING:?Set PREFECT_AUTH_STRING in scripts/docker/.env}
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL:-http://localhost:4200/api}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import base64, os, urllib.request;
          req = urllib.request.Request('http://localhost:4200/api/health');
          auth = os.environ.get('PREFECT_SERVER_API_AUTH_STRING');
          req.add_header('Authorization', 'Basic ' + base64.b64encode(auth.encode()).decode()) if auth else None;
          urllib.request.urlopen(req)"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  sluice:
    image: ${SLUICE_IMAGE:-ghcr.io/nerdneilsfield/sluice-pipeline:latest}
    env_file:
      - .env
    # Register all enabled pipelines as Prefect deployments and serve them.
    command: ["deploy", "--config-dir", "/app/configs"]
    volumes:
      # Mount your TOML config files (read-only)
      - ./configs:/app/configs:ro
      # Persist sluice SQLite state DB and output artifacts
      - ./data:/app/data
    environment:
      TZ: ${TZ:-UTC}
      # Point sluice (and Prefect client) at the local Prefect server
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      PREFECT_API_AUTH_STRING: ${PREFECT_AUTH_STRING:?Set PREFECT_AUTH_STRING in scripts/docker/.env}
    depends_on:
      prefect-server:
        condition: service_healthy

volumes:
  prefect-data:
