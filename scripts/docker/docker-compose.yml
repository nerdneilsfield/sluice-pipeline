# Sluice — standalone mode (no Prefect server)
#
# Runs a single pipeline execution and exits.
# Mount your TOML configs into /app/configs and persist state under /app/data.
#
# Usage:
#   docker compose run --rm sluice run --pipeline my_pipeline
#
# Override the pipeline at the command line:
#   docker compose run --rm sluice run --pipeline other_pipeline --dry-run
#
# To validate configs without running:
#   docker compose run --rm sluice validate
#
# To list configured pipelines:
#   docker compose run --rm sluice list

services:
  sluice:
    build:
      context: ../../
      dockerfile: scripts/docker/Dockerfile
    # Default command: run a single pipeline. Override with `docker compose run`.
    command: ["run", "--pipeline", "my_pipeline"]
    volumes:
      # Mount your TOML config files (read-only)
      - ./configs:/app/configs:ro
      # Persist SQLite state DB and any output artifacts
      - ./data:/app/data
    environment:
      TZ: UTC
