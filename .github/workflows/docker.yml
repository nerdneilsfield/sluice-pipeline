name: Docker

on:
  push:
    tags:
      - "v*.*.*"
    branches: [master]

# Emit "latest" on master push; versioned tags on v* tags.
# We push to two Docker Hub namespaces (nerdneilsfield + nerdneils)
# and also to GHCR (free, OIDC — no extra secrets).

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed for GHCR push via OIDC

    steps:
      - uses: actions/checkout@v4

      # ── QEMU + Buildx for multi-platform builds ──────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Derive image tags ─────────────────────────────────────────────────
      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # We'll apply the same tag set to all three registries below.
          images: |
            nerdneilsfield/sluice-pipeline
            nerdneils/sluice-pipeline
            ghcr.io/nerdneilsfield/sluice-pipeline
          tags: |
            # v1.2.3  → 1.2.3 + 1.2 + 1 + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # master branch → edge
            type=edge,branch=master

      # ── Log in to Docker Hub (nerdneilsfield) ────────────────────────────
      - name: Login to Docker Hub (nerdneilsfield)
        uses: docker/login-action@v3
        with:
          username: nerdneilsfield
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Log in to Docker Hub (nerdneils) ─────────────────────────────────
      - name: Login to Docker Hub (nerdneils)
        uses: docker/login-action@v3
        with:
          username: nerdneils
          password: ${{ secrets.DOCKERHUB_TOKEN_NERDNEILS }}

      # ── Log in to GHCR (uses built-in GITHUB_TOKEN) ──────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build once, push to all three registries ─────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache from GHCR (free, no extra secret)
          cache-from: type=registry,ref=ghcr.io/nerdneilsfield/sluice-pipeline:buildcache
          cache-to: type=registry,ref=ghcr.io/nerdneilsfield/sluice-pipeline:buildcache,mode=max
