name: Docker

on:
  push:
    tags:
      - "v*.*.*"
    branches: [master]

# Push to two registries on every v*.*.* tag or master push:
#   - ghcr.io/nerdneilsfield/sluice-pipeline  (GITHUB_TOKEN, no extra secret)
#   - nerdneils/sluice-pipeline               (secret: DOCKERHUB_TOKEN)

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match pyproject version $VERSION" >&2
            exit 1
          fi

      - name: Check lockfile
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Test
        run: uv run pytest -q

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: verify

    permissions:
      contents: read
      packages: write   # required for GHCR push via OIDC

    steps:
      - uses: actions/checkout@v4

      # ── QEMU + Buildx for multi-platform builds ──────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Derive image tags ─────────────────────────────────────────────────
      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nerdneilsfield/sluice-pipeline
            nerdneils/sluice-pipeline
          tags: |
            # v1.2.3 → 1.2.3 + 1.2 + 1 + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # master branch → edge
            type=edge,branch=master

      # ── Log in to GHCR (uses built-in GITHUB_TOKEN, no secret needed) ────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Log in to Docker Hub (nerdneils) ─────────────────────────────────
      - name: Login to Docker Hub (nerdneils)
        uses: docker/login-action@v3
        with:
          username: nerdneils
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build once, push to both registries ──────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored on GHCR — free, no extra secret
          cache-from: type=registry,ref=ghcr.io/nerdneilsfield/sluice-pipeline:buildcache
          cache-to: type=registry,ref=ghcr.io/nerdneilsfield/sluice-pipeline:buildcache,mode=max
